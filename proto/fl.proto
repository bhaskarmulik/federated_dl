syntax = "proto3";

package falcon;

// ══════════════════════════════════════════════════════════════════════════
//  FALCON — Federated Learning gRPC Service Definition
//  
//  Clients connect to the FederatedLearning service to:
//    1. Register and receive the current global model
//    2. Submit their local model update after training
//    3. Stream heartbeat metrics during training
// ══════════════════════════════════════════════════════════════════════════

service FederatedLearning {
  // Client registration — receive server config + initial global model
  rpc Register (RegisterRequest) returns (RegisterResponse);

  // Pull current global model weights
  rpc PullGlobalModel (PullRequest) returns (stream ModelChunk);

  // Push local model update after training
  rpc PushUpdate (stream ModelChunk) returns (PushResponse);

  // Heartbeat: client streams live training metrics to server
  rpc Heartbeat (stream HeartbeatMetrics) returns (HeartbeatAck);

  // Request the server to aggregate pending updates
  rpc TriggerAggregation (AggregationRequest) returns (AggregationResponse);

  // Get current server status
  rpc GetStatus (StatusRequest) returns (ServerStatus);
}

// ─── Registration ──────────────────────────────────────────────────────────

message RegisterRequest {
  string client_id    = 1;
  int32  n_samples    = 2;    // number of local training samples
  string dataset_name = 3;    // e.g. "BreastMNIST"
  float  alpha        = 4;    // non-IID concentration param
  bool   dp_enabled   = 5;
  float  noise_mult   = 6;
  float  max_grad_norm= 7;
}

message RegisterResponse {
  bool   accepted      = 1;
  string session_token = 2;
  int32  current_round = 3;
  string strategy      = 4;   // fedavg | fedprox | fedbn
  bool   secure_agg    = 5;
  string message       = 6;
}

// ─── Model transfer (chunked for large models) ────────────────────────────

message ModelChunk {
  bytes  data        = 1;    // chunk of pickled state_dict
  int32  chunk_index = 2;
  int32  total_chunks= 3;
  int32  round       = 4;    // round this model belongs to
  string checksum    = 5;    // MD5 of full payload for integrity check
}

message PullRequest {
  string client_id    = 1;
  string session_token= 2;
  int32  round        = 3;   // -1 = latest
}

message PushResponse {
  bool   accepted      = 1;
  string message       = 2;
  int32  queue_position= 3;  // position in aggregation queue
}

// ─── Heartbeat ────────────────────────────────────────────────────────────

message HeartbeatMetrics {
  string client_id   = 1;
  string session_token=2;
  int32  round       = 3;
  int32  step        = 4;
  float  train_loss  = 5;
  float  epsilon     = 6;    // current privacy budget spent
  int64  timestamp   = 7;    // unix ms
  float  cpu_percent = 8;
  float  mem_mb      = 9;
}

message HeartbeatAck {
  bool   ok       = 1;
  string message  = 2;
}

// ─── Aggregation ──────────────────────────────────────────────────────────

message AggregationRequest {
  string client_id    = 1;
  string session_token= 2;
}

message AggregationResponse {
  bool   started  = 1;
  string message  = 2;
  int32  n_clients= 3;
}

// ─── Server status ────────────────────────────────────────────────────────

message StatusRequest {
  string client_id = 1;
}

message ServerStatus {
  string status       = 1;   // idle | waiting | aggregating | done
  int32  round        = 2;
  int32  n_clients    = 3;
  int32  min_clients  = 4;
  string strategy     = 5;
  bool   secure_agg   = 6;
  bool   dp_enabled   = 7;
}
